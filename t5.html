<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Finder</title>
  <link rel="stylesheet" href="t5.css">
  <script src="t5.js" type="module"></script>
</head>
<body>
  <header>
    <h1>Restaurants</h1>
    <button id="loginBtn" class="login-button">Login</button>
  </header>

  <main>
    <div class="filter-buttons">
      <button id="sodexoB">Sodexo Restaurants!</button>
      <button id="compassB">Compass Restaurants!</button>
    </div>

    <table id="target">
      <tr>
        <th>Name</th>
        <th>Address</th>
      </tr>
      <!-- add restaurants here -->
    </table>

    <!-- Restaurant modal -->
    <dialog id="restaurantModal">
      <!-- restaurant info goes here -->
    </dialog>

    <dialog id="loginModal">
      <form id="loginForm">
        <h2>Login</h2>
        <div class="form-group">
          <label for="email">email:</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label for="username">Username:</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password:</label>
          <input type="password" id="password" required>
        </div>
      </div>
        <button type="submit">Log In</button>
        <button type="button" id="closeLoginModal">Cancel</button>
      </form>
    </dialog>
  </main>
</body>
</html>
